<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VAL TRACKER</title>

    <meta property="og:type" content="website" />
    <meta property="og:title" content="VAL TRACKER" />
    <meta
      property="og:description"
      content="Track Valorant accounts, ranks, RR, peak rank, match history, and activity status in real time."
    />
    <meta
      property="og:url"
      content="https://koni-hub.github.io/account-val-tracker/"
    />

    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="VAL TRACKER" />
    <meta
      name="twitter:description"
      content="Track Valorant accounts, ranks, RR, peak rank, match history, and activity status in real time."
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;400;500;600;700&family=Share+Tech+Mono&family=Teko:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --red: #ff4655;
        --white: #ece8e1;
        --white-dim: rgba(236, 232, 225, 0.55);
        --white-faint: rgba(236, 232, 225, 0.07);
        --bg: #0f1118;
        --bg3: #1c2030;
        --panel: rgba(18, 21, 30, 0.97);
        --online: #62dca3;
        --offline: #4a5060;
        --ingame: #ffcc44;
        --border: rgba(255, 70, 85, 0.18);
        --border-soft: rgba(236, 232, 225, 0.07);
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        background: var(--bg);
        color: var(--white);
        font-family: "Rajdhani", sans-serif;
        min-height: 100vh;
        overflow-x: hidden;
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        background-image:
          linear-gradient(rgba(255, 70, 85, 0.03) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255, 70, 85, 0.03) 1px, transparent 1px);
        background-size: 44px 44px;
        pointer-events: none;
        z-index: 0;
      }

      body::after {
        content: "";
        position: fixed;
        top: -15%;
        left: 50%;
        transform: translateX(-50%);
        width: 800px;
        height: 500px;
        background: radial-gradient(
          ellipse,
          rgba(255, 70, 85, 0.05) 0%,
          transparent 68%
        );
        pointer-events: none;
        z-index: 0;
      }

      .scanline {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        height: 2px;
        background: linear-gradient(
          90deg,
          transparent,
          rgba(255, 70, 85, 0.12),
          transparent
        );
        animation: scan 7s linear infinite;
        pointer-events: none;
        z-index: 999;
      }

      @keyframes scan {
        from {
          top: -2px;
        }

        to {
          top: 100vh;
        }
      }

      .wrapper {
        position: relative;
        z-index: 1;
        max-width: 920px;
        margin: 0 auto;
        padding: 36px 24px 80px;
      }

      header {
        display: flex;
        align-items: flex-end;
        justify-content: space-between;
        margin-bottom: 44px;
        padding-bottom: 18px;
        border-bottom: 1px solid var(--border);
        animation: fadeDown 0.5s ease both;
      }

      .logo-label {
        font-family: "Share Tech Mono", monospace;
        font-size: 10px;
        color: var(--red);
        letter-spacing: 4px;
        text-transform: uppercase;
      }

      .logo-title {
        font-family: "Teko", sans-serif;
        font-size: 50px;
        font-weight: 600;
        line-height: 1;
        letter-spacing: 2px;
      }

      .logo-title span {
        color: var(--red);
      }

      .header-meta {
        text-align: right;
        font-family: "Share Tech Mono", monospace;
        font-size: 11px;
        color: var(--white-dim);
        letter-spacing: 1px;
        line-height: 2;
      }

      .live-dot {
        display: inline-block;
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: var(--online);
        margin-right: 6px;
        animation: pulse-dot 2s ease-in-out infinite;
      }

      .api-setup {
        background: var(--panel);
        border: 1px solid var(--border);
        padding: 20px 24px;
        margin-bottom: 28px;
        clip-path: polygon(
          0 0,
          calc(100% - 16px) 0,
          100% 16px,
          100% 100%,
          0 100%
        );
        animation: fadeUp 0.4s 0.1s ease both;
        position: relative;
      }

      .api-setup::after {
        content: "";
        position: absolute;
        top: 0;
        right: 0;
        border-style: solid;
        border-width: 0 16px 16px 0;
        border-color: transparent var(--bg) transparent transparent;
      }

      .api-setup-label {
        font-family: "Share Tech Mono", monospace;
        font-size: 10px;
        color: var(--red);
        letter-spacing: 3px;
        text-transform: uppercase;
        margin-bottom: 10px;
      }

      .api-row {
        display: flex;
        gap: 10px;
      }

      .api-input {
        flex: 1;
        background: var(--bg3);
        border: 1px solid var(--border-soft);
        color: var(--white);
        font-family: "Share Tech Mono", monospace;
        font-size: 12px;
        padding: 10px 14px;
        outline: none;
        letter-spacing: 1px;
        clip-path: polygon(6px 0, 100% 0, 100% 100%, 0 100%, 0 6px);
        transition: border-color 0.2s;
      }

      .api-input:focus {
        border-color: rgba(255, 70, 85, 0.5);
      }

      .api-input::placeholder {
        color: rgba(236, 232, 225, 0.2);
      }

      .btn-save {
        background: var(--red);
        color: var(--white);
        border: none;
        font-family: "Share Tech Mono", monospace;
        font-size: 11px;
        letter-spacing: 2px;
        padding: 0 20px;
        cursor: pointer;
        text-transform: uppercase;
        clip-path: polygon(6px 0, 100% 0, 100% 100%, 0 100%, 0 6px);
        transition: background 0.2s;
        white-space: nowrap;
      }

      .btn-save:hover {
        background: #cc2233;
      }

      .api-note {
        margin-top: 9px;
        font-family: "Share Tech Mono", monospace;
        font-size: 10px;
        color: rgba(236, 232, 225, 0.25);
        letter-spacing: 1px;
      }

      .api-note a {
        color: var(--red);
        text-decoration: none;
      }

      .section-label {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 18px;
        animation: fadeUp 0.4s 0.2s ease both;
      }

      .section-label::before {
        content: "";
        display: block;
        width: 3px;
        height: 18px;
        background: var(--red);
      }

      .section-label span {
        font-family: "Share Tech Mono", monospace;
        font-size: 11px;
        letter-spacing: 3px;
        text-transform: uppercase;
        color: var(--white-dim);
      }

      .refresh-all {
        margin-left: auto;
        background: transparent;
        border: 1px solid var(--border);
        color: var(--white-dim);
        font-family: "Share Tech Mono", monospace;
        font-size: 10px;
        letter-spacing: 2px;
        padding: 5px 14px;
        cursor: pointer;
        clip-path: polygon(6px 0, 100% 0, 100% 100%, 0 100%, 0 6px);
        text-transform: uppercase;
        transition: all 0.2s;
      }

      .refresh-all:hover {
        border-color: var(--red);
        color: var(--red);
      }

      .refresh-all:disabled {
        opacity: 0.3;
        cursor: not-allowed;
      }

      .accounts-grid {
        display: grid;
        gap: 16px;
      }

      .card {
        background: var(--panel);
        border: 1px solid var(--border);
        position: relative;
        overflow: hidden;
        clip-path: polygon(
          0 0,
          calc(100% - 22px) 0,
          100% 22px,
          100% 100%,
          0 100%
        );
        transition:
          border-color 0.3s,
          transform 0.3s;
        animation: fadeUp 0.5s ease both;
      }

      .card:nth-child(1) {
        animation-delay: 0.25s;
      }

      .card:nth-child(2) {
        animation-delay: 0.38s;
      }

      .card:hover {
        border-color: rgba(255, 70, 85, 0.45);
        transform: translateY(-2px);
      }

      .card::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 2px;
        background: linear-gradient(90deg, var(--red) 0%, transparent 55%);
      }

      .card::after {
        content: "";
        position: absolute;
        top: 0;
        right: 0;
        border-style: solid;
        border-width: 0 22px 22px 0;
        border-color: transparent var(--bg) transparent transparent;
      }

      .card-top {
        display: flex;
        align-items: stretch;
      }

      .player-banner {
        width: 90px;
        height: 110px;
        flex-shrink: 0;
        object-fit: cover;
        display: block;
        background: var(--bg3);
      }

      .player-banner-placeholder {
        width: 90px;
        height: 110px;
        flex-shrink: 0;
        background: var(--bg3);
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .player-banner-placeholder svg {
        opacity: 0.2;
      }

      .card-body {
        flex: 1;
        padding: 14px 18px;
        min-width: 0;
      }

      .player-name {
        font-family: "Teko", sans-serif;
        font-size: 28px;
        font-weight: 500;
        line-height: 1;
        letter-spacing: 1px;
      }

      .player-tag {
        font-family: "Share Tech Mono", monospace;
        font-size: 12px;
        color: var(--red);
        letter-spacing: 1px;
        margin-top: 2px;
      }

      .player-level {
        font-family: "Share Tech Mono", monospace;
        font-size: 10px;
        color: rgba(236, 232, 225, 0.25);
        margin-top: 4px;
        letter-spacing: 2px;
      }

      .card-stats {
        display: flex;
        gap: 20px;
        margin-top: 10px;
        flex-wrap: wrap;
      }

      .stat-block {
        display: flex;
        flex-direction: column;
        gap: 2px;
      }

      .stat-label {
        font-family: "Share Tech Mono", monospace;
        font-size: 9px;
        color: rgba(236, 232, 225, 0.28);
        letter-spacing: 2px;
        text-transform: uppercase;
      }

      .stat-value {
        font-family: "Teko", sans-serif;
        font-size: 20px;
        font-weight: 500;
        line-height: 1;
      }

      .rc-radiant {
        color: #f8e5b0;
      }

      .rc-immortal {
        color: #e69bbd;
      }

      .rc-ascendant {
        color: #77c79e;
      }

      .rc-diamond {
        color: #9bb8e8;
      }

      .rc-platinum {
        color: #5cbfbd;
      }

      .rc-gold {
        color: #d4a83a;
      }

      .rc-silver {
        color: #a8b8c8;
      }

      .rc-bronze {
        color: #b87c55;
      }

      .rc-iron {
        color: #787c88;
      }

      .last-match {
        border-top: 1px solid var(--white-faint);
        padding: 10px 20px 12px;
        display: flex;
        align-items: center;
        gap: 14px;
        flex-wrap: wrap;
      }
      .match-history {
        border-top: 1px solid var(--white-faint);
        padding: 12px 20px;
      }

      .history-title {
        font-family: "Share Tech Mono", monospace;
        font-size: 10px;
        letter-spacing: 2px;
        color: rgba(236, 232, 225, 0.35);
        margin-bottom: 10px;
      }

      .history-row {
        display: flex;
        gap: 16px;
        align-items: center;
        padding: 6px 0;
        font-family: "Share Tech Mono", monospace;
        font-size: 11px;
      }

      .history-result {
        width: 22px;
        text-align: center;
        font-weight: 700;
      }

      .history-result.win {
        color: #62dca3;
      }

      .history-result.loss {
        color: #e05555;
      }

      .match-result {
        font-family: "Teko", sans-serif;
        font-size: 16px;
        font-weight: 600;
        letter-spacing: 1px;
        padding: 2px 10px;
        clip-path: polygon(5px 0, 100% 0, 100% 100%, 0 100%, 0 5px);
      }

      .match-result.win {
        color: var(--online);
        border: 1px solid rgba(98, 220, 163, 0.4);
        background: rgba(98, 220, 163, 0.07);
      }

      .match-result.loss {
        color: #e05555;
        border: 1px solid rgba(224, 85, 85, 0.35);
        background: rgba(224, 85, 85, 0.07);
      }

      .match-detail {
        font-family: "Share Tech Mono", monospace;
        font-size: 11px;
        color: var(--white-dim);
        letter-spacing: 1px;
      }

      .match-ago {
        margin-left: auto;
        font-family: "Share Tech Mono", monospace;
        font-size: 10px;
        color: rgba(236, 232, 225, 0.25);
      }

      .card-status {
        padding: 14px 18px;
        display: flex;
        flex-direction: column;
        align-items: flex-end;
        justify-content: center;
        gap: 10px;
        border-left: 1px solid var(--white-faint);
        min-width: 140px;
        flex-shrink: 0;
      }

      .status-badge {
        display: flex;
        align-items: center;
        gap: 7px;
        padding: 5px 12px;
        border: 1px solid currentColor;
        clip-path: polygon(6px 0, 100% 0, 100% 100%, 0 100%, 0 6px);
        font-family: "Share Tech Mono", monospace;
        font-size: 10px;
        font-weight: 600;
        letter-spacing: 2px;
        text-transform: uppercase;
      }

      .status-badge.today {
        color: var(--online);
        background: rgba(98, 220, 163, 0.07);
        border-color: rgba(98, 220, 163, 0.35);
      }

      .status-badge.recent {
        color: var(--ingame);
        background: rgba(255, 204, 68, 0.07);
        border-color: rgba(255, 204, 68, 0.35);
      }

      .status-badge.week {
        color: #8ab4ff;
        background: rgba(138, 180, 255, 0.07);
        border-color: rgba(138, 180, 255, 0.35);
      }

      .status-dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: currentColor;
        flex-shrink: 0;
      }

      .status-badge.recently .status-dot {
        animation: pulse-dot 2s ease-in-out infinite;
      }

      .btn-refresh {
        background: transparent;
        border: 1px solid var(--border-soft);
        color: rgba(236, 232, 225, 0.3);
        font-family: "Share Tech Mono", monospace;
        font-size: 10px;
        letter-spacing: 2px;
        padding: 4px 10px;
        cursor: pointer;
        clip-path: polygon(4px 0, 100% 0, 100% 100%, 0 100%, 0 4px);
        transition: all 0.2s;
        text-transform: uppercase;
      }

      .btn-refresh:hover {
        border-color: var(--red);
        color: var(--red);
      }

      .card-message {
        padding: 28px 24px;
        display: flex;
        align-items: center;
        gap: 14px;
        font-family: "Share Tech Mono", monospace;
        font-size: 12px;
        color: rgba(236, 232, 225, 0.3);
        letter-spacing: 1px;
      }

      .spinner {
        width: 18px;
        height: 18px;
        border: 2px solid rgba(255, 70, 85, 0.2);
        border-top-color: var(--red);
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
        flex-shrink: 0;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      .proxy-status {
        font-family: "Share Tech Mono", monospace;
        font-size: 10px;
        color: rgba(236, 232, 225, 0.2);
        margin-top: 6px;
        letter-spacing: 1px;
      }

      .footer-bar {
        margin-top: 48px;
        padding-top: 18px;
        border-top: 1px solid var(--border);
        display: flex;
        justify-content: space-between;
        font-family: "Share Tech Mono", monospace;
        font-size: 10px;
        color: rgba(236, 232, 225, 0.18);
        letter-spacing: 2px;
        animation: fadeUp 0.4s 0.5s ease both;
      }

      @keyframes fadeDown {
        from {
          opacity: 0;
          transform: translateY(-14px);
        }

        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(14px);
        }

        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes pulse-dot {
        0%,
        100% {
          opacity: 1;
          transform: scale(1);
        }

        50% {
          opacity: 0.45;
          transform: scale(0.7);
        }
      }
    </style>
  </head>

  <body>
    <div class="scanline"></div>
    <div class="wrapper">
      <header>
        <div class="logo">
          <div class="logo-label">// Henrik API · Live Data</div>
          <div class="logo-title">VAL<span>TRACK</span></div>
        </div>
        <div class="header-meta">
          <div><span class="live-dot"></span>LIVE</div>
          <div id="clock">--:--:--</div>
          <div>2 ACCOUNTS</div>
        </div>
      </header>

      <div class="section-label">
        <span>Tracked Players</span>
        <button class="refresh-all" id="refreshAllBtn" onclick="fetchAll()">
          ↻ REFRESH ALL
        </button>
      </div>

      <div class="accounts-grid" id="accountsGrid"></div>

      <div class="footer-bar">
        <span>VALTRACK // HENRIK API v4</span>
        <span id="lastFetch">NOT FETCHED YET</span>
      </div>
    </div>

    <script>
      const ACCOUNTS = [
        { name: "依神 紫苑", tag: "yuji", id: 0 },
        { name: "コニ先輩", tag: "6969", id: 1 },
      ];
      const REGION = "ap";
      const API_KEY = "HDEV-abd6660c-62d7-4c2b-9139-51c64f681645";

      // Multiple proxies to try in order
      const PROXIES = [
        (u) => `https://corsproxy.io/?${encodeURIComponent(u)}`,
        (u) => `https://api.allorigins.win/raw?url=${encodeURIComponent(u)}`,
        (u) => `https://cors-anywhere.herokuapp.com/${u}`,
      ];
      let workingProxyIdx = parseInt(
        localStorage.getItem("working_proxy") || "0",
      );

      function buildUrl(path) {
        return (
          "https://api.henrikdev.xyz" +
          path +
          (path.includes("?") ? "&" : "?") +
          "api_key=" +
          encodeURIComponent(API_KEY)
        );
      }

      async function hfetch(path) {
        const res = await fetch(buildUrl(path));

        if (!res.ok) {
          throw new Error(`HTTP ${res.status}`);
        }

        return await res.json();
      }

      function rankClass(t) {
        if (!t) return "";
        t = t.toLowerCase();
        if (t.includes("radiant")) return "rc-radiant";
        if (t.includes("immortal")) return "rc-immortal";
        if (t.includes("ascendant")) return "rc-ascendant";
        if (t.includes("diamond")) return "rc-diamond";
        if (t.includes("platinum")) return "rc-platinum";
        if (t.includes("gold")) return "rc-gold";
        if (t.includes("silver")) return "rc-silver";
        if (t.includes("bronze")) return "rc-bronze";
        if (t.includes("iron")) return "rc-iron";
        return "";
      }

      function formatPlayedTime(dateStr) {
          if (!dateStr) return "—";

          return new Date(dateStr).toLocaleString("en-US", {
            month: "short",
            day: "numeric",
            hour: "numeric",
            minute: "2-digit",
            hour12: true,
          });
        }

      function timeAgo(date) {
          if (!date) return "—";

          const diff = Math.floor((Date.now() - date.getTime()) / 1000);

          if (diff < 60) return `${diff}s ago`;
          if (diff < 3600) return `${Math.floor(diff / 60)}m ago`;
          if (diff < 86400) return `${Math.floor(diff / 3600)}h ago`;

          return `${Math.floor(diff / 86400)}d ago`;
        }

        function formatPlayed(date) {
            if (!date) return "—";

            return date.toLocaleString("en-US", {
              month: "short",
              day: "numeric",
              hour: "numeric",
              minute: "2-digit",
              hour12: true,
            });
          }

     function actStatus(lastDate) {
        if (!lastDate) return "inactive";

        const hours =
          (Date.now() - new Date(lastDate).getTime()) /
          3600000;

        if (hours <= 24) return "today";
        if (hours <= 72) return "recent";
        if (hours <= 168) return "week";

        return "inactive";
      }

      function actLabel(status) {
        switch (status) {
          case "today":
            return "PLAYED TODAY";

          case "recent":
            return "PLAYED RECENTLY";

          case "week":
            return "PLAYED THIS WEEK";

          default:
            return "INACTIVE";
        }
      }

      function initCards() {
        document.getElementById("accountsGrid").innerHTML = ACCOUNTS.map(
          (a) => `
    <div class="card" id="card-${a.id}">
      <div class="card-message"><span>${a.name} #${a.tag} — paste API key and click SAVE + FETCH</span></div>
    </div>`,
        ).join("");
      }

      function setLoading(id) {
        document.getElementById("card-" + id).innerHTML =
          '<div class="card-message"><div class="spinner"></div><span>FETCHING DATA...</span></div>';
      }

      async function fetchOne(id) {
        const a = ACCOUNTS[id];
        setLoading(id);
        const n = encodeURIComponent(a.name);
        const t = encodeURIComponent(a.tag);
        try {
          const [accD, mmrD, matchD] = await Promise.all([
            hfetch(`/valorant/v1/account/${n}/${t}`),
            hfetch(`/valorant/v1/mmr/${REGION}/${n}/${t}`),
            hfetch(`/valorant/v3/matches/${REGION}/${n}/${t}?size=3`),
          ]);
          renderCard(a, accD, mmrD, matchD);
        } catch (e) {
          document.getElementById("card-" + id).innerHTML =
            `<div class="card-message">⚠ ${e.message}</div>`;
        }
      }

      function renderCard(a, accD, mmrD, matchD) {
        const card = document.getElementById("card-" + a.id);
        const acc = accD?.data;
        if (!acc) {
          card.innerHTML = `<div class="card-message">⚠ ${accD?.errors?.[0]?.message || "Player not found — check name/tag"}</div>`;
          return;
        }
        const img = acc.card?.large || acc.card?.small || null;
        const level = acc.account_level || "?";
        const mmr = mmrD?.data;
        const tier =
          mmr?.currenttierpatched || mmr?.current?.tier?.name || "Unranked";
        const rr = mmr?.ranking_in_tier ?? mmr?.current?.rr ?? "—";
        const peak =
          mmr?.highest_rank?.patched_tier || mmr?.peak?.tier?.name || "—";

        const matches = matchD?.data || [];
        const latestMatch = matches[0] || null;
        let lastDate = null;
        let matchHTML = "";

        if (matches.length) {
          lastDate = latestMatch.metadata?.game_start
            ? new Date(latestMatch.metadata.game_start * 1000)
            : null;

          const rows = matches
            .map((match) => {

              console.log("MATCH");
              console.log({
                game_start: match.metadata?.game_start,
                game_start_patched: match.metadata?.game_start_patched,
                started_at: match.metadata?.started_at,
                metadata: match.metadata,
              });

              const me = (match.players?.all_players || []).find(
                (p) =>
                  p.name?.toLowerCase() === a.name.toLowerCase() &&
                  p.tag?.toLowerCase() === a.tag.toLowerCase(),
              );

              const won = match.teams?.[me?.team?.toLowerCase()]?.has_won;

              const map = match.metadata?.map || "Unknown";

              const kda = me
                ? `${me.stats?.kills}/${me.stats?.deaths}/${me.stats?.assists}`
                : "—";

              const agent = me?.character || "Unknown";

              const played = match.metadata?.game_start
                ? new Date(match.metadata.game_start * 1000)
                : null;

              return `
      <div class="history-row">
        <span class="history-result ${won ? "win" : "loss"}">
          ${won ? "W" : "L"}
        </span>

        <span>${map}</span>
        <span>${agent}</span>
        <span>${kda}</span>
        <span>${formatPlayed(played)}</span>
      </div>
    `;
            })
            .join("");

          matchHTML = `
    <div class="match-history">
      <div class="history-title">
        LAST 3 MATCHES
      </div>

      ${rows}
    </div>
  `;
        }

        const st = actStatus(lastDate);
        card.innerHTML = `
    <div class="card-top">
      ${
        img
          ? `<img class="player-banner" src="${img}" alt="" onerror="this.style.display='none'">`
          : `<div class="player-banner-placeholder"><svg width="32" height="32" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="8" r="4" stroke="#ECE8E1" stroke-width="1.5"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7" stroke="#ECE8E1" stroke-width="1.5" stroke-linecap="round"/></svg></div>`
      }
      <div class="card-body">
        <div class="player-name">${a.name}</div>
        <div class="player-tag">#${a.tag}</div>
        <div class="player-level">LVL ${level}</div>
        <div class="card-stats">
          <div class="stat-block"><div class="stat-label">RANK</div><div class="stat-value ${rankClass(tier)}">${tier}</div></div>
          <div class="stat-block"><div class="stat-label">RR</div><div class="stat-value">${rr !== "—" ? rr + " RR" : "—"}</div></div>
        </div>
      </div>
      <div class="card-status">
        <div class="status-badge ${st}"><div class="status-dot"></div><span>${actLabel(st)}</span></div>
        <button class="btn-refresh" onclick="fetchOne(${a.id})">↻ REFRESH</button>
      </div>
    </div>
    ${matchHTML}`;
      }

      async function fetchAll() {
        const btn = document.getElementById("refreshAllBtn");
        btn.disabled = true;
        await Promise.all(ACCOUNTS.map((a) => fetchOne(a.id)));
        const n = new Date();
        document.getElementById("lastFetch").textContent =
          "LAST FETCH " +
          [n.getHours(), n.getMinutes(), n.getSeconds()]
            .map((x) => x.toString().padStart(2, "0"))
            .join(":");
        btn.disabled = false;
      }

      setInterval(() => {
          document.getElementById("clock").textContent =
            new Date().toLocaleTimeString("en-US", {
              hour: "numeric",
              minute: "2-digit",
              second: "2-digit",
              hour12: true,
            });
        }, 1000);

      initCards();

      window.addEventListener("load", () => {
        fetchAll();
      });
    </script>
  </body>
</html>
